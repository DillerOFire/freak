name: docker

on:
  push:
    branches: [master]
    tags: ["v*"]
  # Daily rebuild keeps yt-dlp (and other deps) fresh in the image without
  # requiring a code push.
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write build metadata
        id: buildinfo
        run: |
          python3 scripts/write_build_info.py
          echo "commit=$(python3 -c 'import json; print(json.load(open(".build-info.json"))["commit"])')" >> "$GITHUB_OUTPUT"
          echo "short=$(python3 -c 'import json; print(json.load(open(".build-info.json"))["short"])')" >> "$GITHUB_OUTPUT"
          echo "subject=$(python3 -c 'import json; print(json.load(open(".build-info.json"))["subject"])')" >> "$GITHUB_OUTPUT"
          echo "date=$(python3 -c 'import json; print(json.load(open(".build-info.json"))["date"])')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=schedule,pattern=nightly

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.buildinfo.outputs.commit }}
            GIT_COMMIT_SHORT=${{ steps.buildinfo.outputs.short }}
            GIT_COMMIT_SUBJECT=${{ steps.buildinfo.outputs.subject }}
            GIT_COMMIT_DATE=${{ steps.buildinfo.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
