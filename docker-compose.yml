# Per-instance deployment file.
# Copy .env into the deploy dir (or set env_file path) and adjust the host
# port for the telemetry dashboard. Each instance runs from the same image.
services:
  bot:
    image: ghcr.io/dillerofire/freak:latest
    container_name: freak
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MODE: docker
      ENV_FILE: /data/.env
    volumes:
      - ./data:/data
    # Telemetry dashboard. Bind to localhost only; expose via reverse proxy
    # or SSH tunnel if remote access is needed.
    ports:
      - "127.0.0.1:${TELEMETRY_DASHBOARD_PORT:-8765}:${TELEMETRY_DASHBOARD_PORT:-8765}"
